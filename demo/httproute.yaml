apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: demo-api-route
  namespace: console-demo-resources
  labels:
    app.kubernetes.io/part-of: console-demo-resources
spec:
  parentRefs:
    - name: demo-gateway
      namespace: console-demo-resources
  hostnames:
    - api.demo.example.com
  rules:
    - matches:
        - method: GET
          path:
            type: PathPrefix
            value: /products
      backendRefs:
        - name: demo-api-svc
          port: 8080
          weight: 1
    - matches:
        - method: POST
          path:
            type: PathPrefix
            value: /orders
      backendRefs:
        - name: demo-api-svc
          port: 8080
          weight: 1
